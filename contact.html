<!DOCTYPE html>
<html lang="en">
<head>
<title>Contact - Chuchunel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Georgia, 'Times New Roman', Times, serif;
}

body{
background:#f4f6f9;
}

header{
background:#496988;
color:white;
text-align:right;
padding:10px;
}

nav{
background:#95ADC6;
display:flex;
justify-content:center;
padding:12px;
}

nav a{
color:white;
text-decoration:none;
margin:0 10px;
font-weight:500;
transition:0.3s;
}

nav a:hover{
color:#dbeafe;
}

.container{
max-width:1100px;
margin:auto;
display:flex;
gap:30px;
padding:120px 20px;
}

.box{
background:white;
padding:40px;
flex:1;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
text-align:center;
}

.box h2{
margin-bottom:15px;
color:#1e3a8a;
}

.box p{
color:#555;
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#2563eb;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

footer{
background:#496988;
color:white;
text-align:center;
padding:15px;
}

@media (max-width:768px){

.container{
flex-direction:column;
}

nav{
flex-direction:column;
align-items:center;
}

nav a{
margin:8px 0;
}

}

</style>

</head>

<body>

<header>
<h1>Chuchunel</h1>
<p>Fasyon</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="aboutus.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<div class="container">

<div class="box">
<h2>Contact Us</h2>

<form>

<label>Name</label>
<input type="text" name="name" required>

<label>Email</label>
<input type="email" name="email" required>

<label>Age</label>
<input type="number" name="age" required>

<label>Message</label>
<textarea name="message" rows="4" required></textarea>

<button type="submit">Send Message</button>

</form>
</div>

</div>

<footer>
<p>© 2026 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
