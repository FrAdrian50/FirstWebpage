.box p{

}

footer{
    background:#496988;

    padding:15px;

    flex-direction:column;
}

nav{

    align-items:center;
}

nav a{
    margin:8px 0;
}
.box{
    background: rgb(81, 98, 156);
    color:white;
    height: 250px;
    border-radius: 15px;
    padding: 20px;
    margin: 10px;
    width: 30%;
    display: inline-block;

    transition: transform 0.4s ease, background 0.4s ease;
}

.box:hover{
    transform: scale(1.05);
    background: rgb(65, 80, 135);
}

}
